<div class="flex gap-4 rounded-medium border border-solid border-outline-variant p-2 mb-4">
  <md-button (click)="nextVariant()">{{ variant() }}</md-button>
  <md-button (click)="disabled.set(!disabled())">Toggle disabled</md-button>
  <md-button (click)="busy.set(!busy())">Toggle busy</md-button>
</div>
<div class="flex flex-col items-start col-span-2 gap-4 rounded-medium border border-solid border-outline-variant p-2">
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null">
    button
  </md-button>
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null" href="#">
    anchor
  </md-button>
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null">
    <md-icon slot="leading">home</md-icon>
    button
  </md-button>
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null">
    button
    <md-icon slot="trailing">home</md-icon>
  </md-button>
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null">
    <md-icon slot="leading">home</md-icon>
    button
    <md-icon slot="trailing">home</md-icon>
  </md-button>
  <md-button [variant]="variant()" [disabled]="disabled() || null" [busy]="busy() || null" class="w-full">
    <md-icon slot="leading">home</md-icon>
    button
    <md-icon slot="trailing">home</md-icon>
  </md-button>
</div>

<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant mb-4">
  <md-button (click)="isOutlined.set(!isOutlined())">
    Toggle variant
  </md-button>
  <md-button (click)="isError.set(!isError())">
    Toggle error
  </md-button>
  <md-button (click)="disabled.set(!disabled())">
    Toggle disabled
  </md-button>
</div>
<div class="flex flex-col gap-4 p-2 border border-solid border-outline-variant mb-4">
  <md-text-field [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00" [disabled]="disabled()">
  </md-text-field>
  <md-text-field [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00" [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    <md-icon slot="trailing">home</md-icon>
  </md-text-field>
  <md-text-field label="Label" [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00"
    [disabled]="disabled()">
  </md-text-field>
  <md-text-field label="Label" [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00"
    [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    <md-icon slot="trailing">home</md-icon>
  </md-text-field>
  <md-text-field label="Label" [variant]="variant()" [attr.error-text]="errorText()"
    supportingText="This is the supporting text." prefix="$" suffix=".00" counter max-length="30"
    [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    <md-icon slot="trailing">home</md-icon>
  </md-text-field>
  <md-text-field label="Label" type="textarea" [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00"
    [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    <md-icon slot="trailing">home</md-icon>
  </md-text-field>
  <md-text-field label="Label" type="textarea" [variant]="variant()" [attr.error-text]="errorText()" prefix="$" suffix=".00"
    [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    <md-icon slot="trailing">home</md-icon>
    <md-list-item slot="item" value="one">One</md-list-item>
    <md-list-item slot="item" value="two">Two</md-list-item>
    <md-list-item slot="item" value="three">Three</md-list-item>
  </md-text-field>
</div>

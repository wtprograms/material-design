<md-card class="flex flex-row p-4 gap-4">
  <md-button (click)="next()">{{ layout() }}</md-button>
  <md-button (click)="embedded.set(!embedded())">embedded: {{ embedded() }}</md-button>
  <md-button (click)="navigation.open = !navigation.open">open: {{ navigation.open }}</md-button>
  <md-button (click)="embed()">embed</md-button>
</md-card>

<h1>
  md-typescale
</h1>
<md-card>
  <md-typescale responsive>This is the header.</md-typescale>
</md-card>
<md-card class="flex flex-col p-4 gap-4">
  @for (scale of scales; track scale) {
  @for (size of sizes; track size) {
  <md-typescale [scale]="scale" [size]="size">{{ scale }} {{ size }}</md-typescale>
  }
  }
</md-card>

<div class="flex gap-4 rounded-medium border border-solid border-outline-variant p-2 mb-4">
  <md-button (click)="nextVariant()">{{ variant() }}</md-button>
  <md-button (click)="disabled.set(!disabled())">Toggle disabled</md-button>
  <md-button (click)="busy.set(!busy())">Toggle busy</md-button>
  <md-button (click)="selected.set(!selected())">Toggle selected</md-button>
</div>
<div class="flex items-start col-span-2 gap-4 rounded-medium border border-solid border-outline-variant p-2">
  <md-icon-button [variant]="variant()" [disabled]="disabled()" [busy]="busy()" [selected]="selected()">
    home
  </md-icon-button>
  <md-icon-button [variant]="variant()" [disabled]="disabled()" [busy]="busy()" href="#" [selected]="selected()">
    link
  </md-icon-button>
  <md-icon-button custom [variant]="variant()" [disabled]="disabled()" [busy]="busy()" [selected]="selected()">
    1
  </md-icon-button>
</div>

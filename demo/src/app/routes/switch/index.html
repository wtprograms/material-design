<h1>
  md-switch
</h1>
<div class="flex flex-row border p-4 gap-4">
  <md-switch></md-switch>
  <md-switch checked></md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch>
    <md-icon slot="unchecked-icon">close</md-icon>
  </md-switch>
  <md-switch>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
  <md-switch>
    <md-icon slot="unchecked-icon">close</md-icon>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch>
    <span slot="label">This is the switch's label.</span>
  </md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch has-error></md-switch>
  <md-switch has-error checked></md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch has-error>
    <span slot="label">This is the switch's label.</span>
  </md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch disabled></md-switch>
  <md-switch disabled checked></md-switch>
  <md-switch disabled>
    <md-icon slot="unchecked-icon">close</md-icon>
  </md-switch>
  <md-switch disabled checked>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
</div>
<div class="flex flex-row border p-4 gap-4">
  <md-switch disabled>
    <span slot="label">This is the switch's label.</span>
  </md-switch>
</div>

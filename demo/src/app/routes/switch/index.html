<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant mb-4">
  <md-switch></md-switch>
  <md-switch checked></md-switch>
</div>
<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant">
  <md-switch>
    <md-icon slot="unchecked-icon">close</md-icon>
  </md-switch>
  <md-switch>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
  <md-switch>
    <md-icon slot="unchecked-icon">close</md-icon>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
</div>
<div class="flex flex-col gap-4 p-2 border border-solid border-outline-variant">
  <md-switch>
    This is the switch's label.
  </md-switch>
</div>
<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant">
  <md-switch [error]="true"></md-switch>
  <md-switch [error]="true" checked></md-switch>
</div>
<div class="flex flex-col gap-4 p-2 border border-solid border-outline-variant">
  <md-switch [error]="true" label="">
    This is the switch's label.
  </md-switch>
</div>
<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant">
  <md-switch [disabled]="true"></md-switch>
  <md-switch [disabled]="true" checked></md-switch>
  <md-switch [disabled]="true">
    <md-icon slot="unchecked-icon">close</md-icon>
  </md-switch>
  <md-switch [disabled]="true" checked>
    <md-icon slot="checked-icon">check</md-icon>
  </md-switch>
</div>
<div class="flex flex-col gap-4 p-2 border border-solid border-outline-variant">
  <md-switch [disabled]="true">
    This is the switch's label.
  </md-switch>
</div>

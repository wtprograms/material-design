<div class="flex flex-row gap-4 p-2 border border-solid border-outline-variant mb-4">
  <md-button (click)="populated.set(!populated())">
    Toggle populated
  </md-button>
  <md-button (click)="isOutlined.set(!isOutlined())">
    Toggle variant
  </md-button>
  <md-button (click)="isError.set(!isError())">
    Toggle error
  </md-button>
  <md-button (click)="disabled.set(!disabled())">
    Toggle disabled
  </md-button>
</div>
<div class="flex flex-col gap-4 p-2 border border-solid border-outline-variant mb-4">
  <md-field [attr.populated]="populated() || null" [variant]="variant()" [errorText]="errorText()" prefix="$"
    suffix=".00" [disabled]="disabled()">
    Field content
  </md-field>
  <md-field [attr.populated]="populated() || null" [variant]="variant()" [errorText]="errorText()" prefix="$"
    suffix=".00" [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    Field content
    <md-icon slot="trailing">home</md-icon>
  </md-field>
  <md-field label="Label" [attr.populated]="populated() || null" [variant]="variant()" [errorText]="errorText()"
    prefix="$" suffix=".00" [disabled]="disabled()">
    Field content
  </md-field>
  <md-field label="Label" [attr.populated]="populated() || null" [variant]="variant()" [errorText]="errorText()"
    counter="12/30" prefix="$" suffix=".00" [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    Field content
    <md-icon slot="trailing">home</md-icon>
  </md-field>
  <md-field label="Label" [attr.populated]="populated() || null" [variant]="variant()" [errorText]="errorText()"
    supportingText="This is the supporting text." prefix="$" suffix=".00" [disabled]="disabled()">
    <md-icon slot="leading">home</md-icon>
    10000
    <md-icon slot="trailing">home</md-icon>
  </md-field>
</div>

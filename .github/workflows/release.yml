name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run buld --if-present
    - name: Set package.json version
      # You may pin to the exact commit or the version.
      # uses: HarmvZ/set-package-json-version-action@e7e0e86480e2c8623033617a4a2f4cd8182ceff9
      uses: HarmvZ/set-package-json-version-action@v0.2.5
      with:
        version: ${{ github.ref }}
    - run: npm publish --access public --tag ${{ github.ref }}
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
